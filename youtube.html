07-13", "channel": "경제 읽어주는 남자(김광석TV)", "title": "AI가 미래를 맞힌다는 착각? 돈 잃지 않으려면 반드시 알아야 할 51%의 법칙 | 경읽남과 토론합시다 | 이시한 교수님 [3편]", "url": "", "summary": "📌 한 줄 요약\nAI가 미래를 완벽하게 예측할 수 있다는 착각에서 벗어나, 인간이 주도적으로 판단하고 책임지는 공동지능의 자세가 필요하다는 내용입니다.\n\n💡 쉽게 풀면\n많은 사람이 AI가 미래를 알려줄 것이라고 믿고 투자나 인생 계획을 전적으로 맡기곤 합니다. 하지만 기술은 예상치 못한 방향으로 급변하기 때문에, AI가 내놓은 일반적인 정보만 믿는 것은 매우 위험합니다. 따라서 AI는 보조 도구로 활용하되, 본인의 상황에 맞춰 스스로 생각하고 최종 판단을 내리는 능력을 키워야 합니다. 이렇게 인간과 AI가 협력하여 대응력을 높이는 것을 공동지능이라고 부릅니다.\n\n✅ 핵심 포인트\n· 미래는 예측하는 것이 아니라 급변하는 기술에 맞춰 대응력을 기르는 것이 중요합니다.\n· AI는 보편적인 정보만 제공할 뿐 개인의 구체적인 상황이나 돌발 변수는 알지 못합니다.\n· AI의 결과를 그대로 수용하기보다 사람이 최종적으로 검증하고 판단하는 책임이 반드시 필요합니다."}, {"date": "2026-07-15", "channel": "경제 읽어주는 남자(김광석TV)", "title": "경제는 호황이라는데 왜 나만 힘들까? K자형 양극화의 진짜 현실 | 김광석의 북리뷰 | 어떻게 살아낼 것인가 [1편]", "url": "", "summary": "📌 한 줄 요약\n경제 지표는 호황을 가리키는데 실제 내 삶은 왜 힘든지에 대한 이유를 살펴보고, 어려운 시기를 이겨낼 마음가짐을 공유하는 영상입니다.\n\n💡 쉽게 풀면\n반도체 같은 특정 산업만 수출이 잘 되면서 전체적인 경제 지표는 좋아 보이지만, 정작 대다수 중소기업이나 일반 근로자는 경기 회복을 느끼기 어려운 불균형이 나타나고 있습니다. 이를 산업과 기업 간의 격차가 벌어지는 케이(K)자형 양극화라고 합니다. 이런 상황에서 저자는 남들이 말하는 호황에 흔들리기보다 나만의 의미 있는 일을 찾고 삶의 절벽을 마주했을 때 그것을 어떻게 극복할지에 대해 조언합니다.\n\n✅ 핵심 포인트\n· 대기업과 일부 수출 산업만 돈을 벌면서 일반 사람들이 느끼는 체감 경기는 여전히 차갑습니다.\n· 경제가 어려운 시대일수록 내가 좋아하거나 현재 하는 일에서 가치를 찾는 것이 중요합니다.\n· 삶에서 겪는 실패와 안개 같은 혼란은 내 잘못이 아니니 스스로를 위로하며 나아가는 태도가 필요합니다."}, {"date": "2026-07-15", "channel": "전인구경제연구소", "title": "노후 준비 지금부터 준비해야 됩니다. 비트코인 모으세요(ft.박종한 작가 1부)", "url": "", "summary": "📌 한 줄 요약\n노후 준비를 위해 비트코인을 중심으로 알트코인까지 활용하는 효율적인 자산 배분 전략을 다루고 있습니다.\n\n💡 쉽게 풀면\n은퇴를 준비할 때 단순히 현금만 모으는 것보다 비트코인 같은 가상자산을 포트폴리오에 넣으면 더 효과적일 수 있습니다. 다만 알트코인(비트코인을 제외한 나머지 가상자산)은 변동성이 매우 크기 때문에 무작정 투자하기보다 기술력이나 쓰임새를 따져보고 신중하게 골라야 합니다. 또한 코인을 단순히 보유만 하는 것이 아니라 스테이킹(가상자산을 예치하고 이자처럼 보상을 받는 것)을 활용하면 복리 효과를 통해 자산을 더 빠르게 불릴 수도 있습니다. 무리한 투자보다는 전체 자산의 적정 비율을 지키면서 안전하게 장기적으로 접근하는 것이 중요합니다.\n\n✅ 핵심 포인트\n· 가상자산 투자는 변동성이 크므로 무작정 따라 하기보다는 펀더멘털(기업의 재무 상태나 기술적 가치)을 꼼꼼히 확인해야 합니다.\n· 가상자산을 예치하고 이자를 받는 스테이킹을 적절히 활용하면 자산을 늘리는 데 큰 도움이 될 수 있습니다.\n· 큰 수익을 쫓는 고위험 투자보다는 안정적인 비트코인을 중심으로 자산의 비중을 조절하는 전략이 필요합니다."}, {"date": "2026-07-15", "channel": "한경 글로벌마켓", "title": "[김종학의 뉴욕, 지금-7월15일] SK하이닉스 본주-ADR 괴리율 51% | 호르무즈 통행료 20% '없던 일' | CPI 6년 만에 '마이너스' | IBM, 핵심 사업 '흔들'", "url": "", "summary": "📌 한 줄 요약\n미국 소비자물가지수(CPI, 물건 가격의 평균적인 변화를 나타내는 지표)가 6년 만에 마이너스를 기록하며 시장이 안도하고 반도체 주식들이 급등한 뉴욕 증시 상황을 정리합니다.\n\n💡 쉽게 풀면\n최근 미국에서 발표된 소비자물가지수가 예상보다 크게 낮아지면서, 물가가 안정될 것이라는 기대감에 시장이 긍정적인 반응을 보였습니다. 덕분에 그동안 부진했던 반도체 관련 종목들이 강한 상승세를 나타냈고, 미국 대형 은행들의 실적 또한 시장의 기대치를 뛰어넘는 좋은 성적을 거두었습니다. 다만, 트럼프 대통령의 중동 관련 발언에 따라 국제 유가가 출렁이는 등 변수는 여전히 남아 있는 상태입니다.\n\n✅ 핵심 포인트\n· 소비자물가지수가 예상 밖의 마이너스를 기록하며 물가 걱정이 조금 줄어들었습니다.\n· 엔비디아와 SK하이닉스 ADR(미국 주식 시장에 상장된 한국 주식) 등 반도체 관련 주식들이 큰 폭으로 올랐습니다.\n· 미국 대형 은행들이 예상보다 좋은 실적을 발표하며 금융 시장에 활력을 불어넣었습니다."}, {"date": "2026-07-16", "channel": "경제 읽어주는 남자(김광석TV)", "title": "취업도 창업도 막막한 시대, 결국 ‘돈의 방향’을 뒤집어야 합니다 | 김광석의 북리뷰 | 어떻게 살아낼 것인가 [2편]", "url": "", "summary": "📌 한 줄 요약\n불안한 경제 상황 속에서 단순히 돈을 벌기 위해 일하는 것이 아니라, 자신이 좋아하는 일을 찾아 삶의 주도권을 잡아야 한다는 조언을 담고 있습니다.\n\n💡 쉽게 풀면\n지금은 인공지능의 발달과 인구 변화로 인해 청년들의 취업이 어렵고 자영업자들의 경쟁도 매우 치열합니다. 이런 막막한 상황에서 사람들은 돈을 목적으로 일을 선택하기 쉽지만, 오히려 성공한 사람들은 돈을 일을 지속하기 위한 도구로 생각하며 자신의 분야에서 탁월함을 추구했습니다. 우리도 돈을 쫓는 방향을 뒤집어 내가 정말 좋아하고 의미를 느낄 수 있는 일을 찾으면, 결과적으로 부와 행복은 자연스럽게 따라올 것입니다. 만약 좋아하는 일을 찾기 어렵다면 현재 주어진 일 안에서 나만의 의미를 부여하며 성취감을 찾아보길 권합니다.\n\n✅ 핵심 포인트\n· 인공지능과 인구 구조의 변화로 인해 취업과 창업 시장이 매우 어려운 환경에 놓여 있습니다.\n· 돈을 벌기 위해 일을 선택하는 대신, 자신이 좋아하고 탁월함을 발휘할 수 있는 일을 중심으로 삶의 방향을 바꾸어야 합니다.\n· 현재 어떤 일을 하든 그 안에서 나만의 의미를 발견하고 몰입할 때 더 행복하고 가치 있는 삶을 살 수 있습니다."}, {"date": "2026-07-16", "channel": "한경 글로벌마켓", "title": "[김종학의 뉴욕, 지금-7월16일] 애플, 알리바바 손잡고 중국서 AI 서비스 인가 | ASML 호실적에도 반도체 또 무더기 하락 | 마이크론 -8%, SK하이닉스 -9%", "url": "", "summary": "📌 한 줄 요약\n애플의 중국 내 인공지능 사업 진출 소식에도 불구하고, 반도체 관련주들이 큰 폭으로 하락하며 뉴욕 증시가 혼조세를 보였습니다.\n\n💡 쉽게 풀면\n오늘 뉴욕 증시는 애플이 중국에서 인공지능 서비스를 시작한다는 소식에 기술주들이 관심을 받았지만, 전반적으로는 반도체 기업들의 주가가 크게 떨어지면서 시장 분위기가 가라앉았습니다. 물가 지표가 발표되었음에도 연준 위원들은 여전히 금리 인하에 신중한 태도를 보이고 있어 투자자들의 불안감이 여전한 상황입니다. 이란을 둘러싼 국제 정세가 긴박하게 돌아가면서 유가가 오르는 등 시장을 위협하는 변수들도 계속해서 나타나고 있습니다.\n\n✅ 핵심 포인트\n· 애플이 알리바바와 협력해 중국에서 인공지능 서비스를 제공한다는 소식에 주가가 올랐습니다.\n· 마이크론이나 SK하이닉스와 같은 반도체 관련 기업들의 주가가 큰 폭으로 하락하며 시장 전반에 영향을 미쳤습니다.\n· 연준의 금리 결정에 영향을 줄 물가 지표가 나왔지만, 여전히 불확실성이 높아 시장이 안심하지 못하는 모습입니다."}, {"date": "2026-07-16", "channel": "경제 읽어주는 남자(김광석TV)", "title": "[속보] 한국은행, 3년 6개월만의 금리인상, 물가·환율 불안에 금리인상 단행 [즉시분석]", "url": "", "summary": "📌 한 줄 요약\n한국은행이 물가와 환율 문제를 해결하기 위해 3년 6개월 만에 기준금리를 인상했습니다.\n💡 쉽게 풀면\n기준금리는 나라 경제의 온도를 조절하는 리모컨과 같은데, 최근 물가가 오르고 환율까지 불안해지자 한국은행이 금리를 올려 시장의 열기를 식히기로 했습니다. 지난 1년 넘게 금리를 그대로 유지해 왔지만, 더 이상 두고 볼 수 없다는 판단을 내린 것입니다. 이번 결정으로 대출 이자는 다소 늘어날 수 있지만, 전반적인 물가 안정과 환율 진정을 위한 고육지책으로 보입니다.\n✅ 핵심 포인트\n· 물가 상승과 환율 불안을 잡기 위해 한국은행이 기준금리를 올렸습니다.\n· 금리를 인상하면 시장에 풀린 돈의 속도가 줄어들어 물가를 낮추는 데 도움이 됩니다.\n· 앞으로 경기를 살피면서 8월에는 잠시 쉬어가고 10월쯤 추가 인상을 고려할 가능성이 있습니다."}, {"date": "2026-07-16", "channel": "경제 읽어주는 남자(김광석TV)", "title": "[속보] '최대 실적' TSMC, 2분기 매출 58조원 돌파… 영업이익률 60.3% [즉시분석]", "url": "", "summary": "📌 한 줄 요약\n세계 최대 반도체 위탁 생산 기업인 TSMC가 기록적인 실적을 발표하며 인공지능 산업의 성장이 여전히 건재함을 증명했습니다.\n💡 쉽게 풀면\n대만 기업인 TSMC는 반도체를 직접 설계하지 않고 다른 기업이 주문한 반도체를 대신 만들어주는 파운드리(반도체 위탁 생산) 분야에서 세계 1위 자리를 지키고 있습니다. 최근 실적 발표 결과 매출과 이익이 크게 늘어나며 시장의 예상치를 뛰어넘는 어닝 서프라이즈(예상보다 훨씬 좋은 실적)를 기록했습니다. 이는 인공지능 관련 산업에 거품이 있다는 우려를 잠재우는 강력한 신호로, 인공지능 기술이 발전하기 위해 필요한 핵심 반도체 수요가 여전히 매우 많다는 것을 보여줍니다. 주식 시장은 여러 외부 요인으로 흔들리고 있지만, 기업이 실제로 돈을 잘 벌고 있다는 사실은 변함이 없다는 분석입니다.\n✅ 핵심 포인트\n· TSMC는 인공지능 반도체 수요 확대에 힘입어 역대급 매출과 순이익을 기록했습니다.\n· 이번 실적은 인공지능 산업에 대한 거품 논란을 잠재우고 반도체 업황이 여전히 좋다는 것을 나타냅니다.\n· 현재 주식 시장의 불안정성은 실적 문제라기보다 국민연금의 매도나 레버리지 ETF(지수 수익률의 몇 배를 추종하는 파생상품) 등 수급 요인의 영향이 큽니다."}, {"date": "2026-07-16", "channel": "김작가 TV", "title": "반도체 호황 뒤 충격적 결말, 삼성전자, SK하이닉스 정말 위험합니다 (김진 앵커)", "url": "", "summary": "📌 한 줄 요약\n반도체 시장이 지금은 무척 좋지만, 앞으로 언제 어떻게 변할지 알 수 없어 미래를 낙관하기 어렵다는 경고입니다.\n💡 쉽게 풀면\n삼성전자와 SK하이닉스가 지금 큰 돈을 벌고 있는 것은 과거의 적자를 견뎌온 노력과 함께 AI 시대라는 우연한 기회가 잘 맞아떨어진 결과입니다. 하지만 반도체 산업은 경기를 타는 사이클(주기적으로 호황과 불황이 반복되는 현상)의 영향이 커서 지금의 성과가 10년 뒤에도 이어질지는 아무도 장담할 수 없습니다. 지금은 차세대 기술을 위해 과감하게 투자해야 할 중요한 시기인데, 기업 내부의 노사 갈등 때문에 성장이 발목 잡혀 있는 상황 · 개인 투자자가 주식을 많이 사들이고 있지만 추세적으로 하락할 때는 위험할 수 있어 무리한 매수는 피해야 합니다.\n· 지금은 급한 반등을 기대하며 주식을 사기보다 장기적인 안목으로 시장 상황을 지켜보며 대응하는 것이 좋습니다."}, {"date": "2026-07-16", "channel": "한경 글로벌마켓", "title": "[빈난새의 개장전요것만-7월15일] 버핏 인터뷰 | ASML 호실적에도 불안 | 애플-알리바바 AI 중국 출시 | CXMT 공모가 | 6월 PPI | AEHR 존슨앤존슨 엘레번스", "url": "", "summary": "📌 한 줄 요약\n미국 증시가 인플레이션 완화 지표 발표로 상승 흐름을 보이고 있지만 기업들의 실적과 반도체 시장의 변동성에 대한 경계심이 공존하고 있습니다.\n\n💡 쉽게 풀면\n물가 상승세가 다소 꺾였다는 희소식이 전해지며 시장은 긍정적인 반응을 보이고 있습니다. 하지만 반도체 장비 기업인 ASML이 좋은 성적을 내고도 시장의 기대치에 미치지 못해 주가가 흔들리는 등 투자자들의 고민이 깊어지는 상황입니다. 워런 버핏은 최근의 시장이 도박판처럼 변해 가치 투자가 어려워졌다고 평가하기도 했습니다. 전반적으로 기업들의 실적을 꼼꼼히 확인하며 시장의 방향성을 조심스럽게 살필 필요가 있습니다.\n\n✅ 핵심 포인트\n· 물가 상승을 측정하는 지표인 생산자 물가 지수(PPI)가 시장의 예상보다 낮게 나와 물가 부담이 줄었습니다.\n· 반도체 장비 기업인 ASML은 실적은 좋았지만 시장의 높은 기대치를 완전히 충족하지 못해 주가가 불안정한 흐름을 보였습니다.\n· 워런 버핏은 현재의 투자 환경을 가치 투자가 어려운 도박판 같은 시장이라고 진단하며 빅테크 기업들의 변화에 주목하고 있습니다."}, {"date": "2026-07-17", "channel": "박종훈의 지식한방", "title": "주가가 오를수록 망해가는 이 나라 (박종훈의 지식한방)", "url": "", "summary": "📌 한 줄 요약\n경제 상황이 나쁜데도 주가만 비정상적으로 급등하고 있는 튀르키예 경제의 위험한 실체를 분석합니다.\n💡 쉽게 풀면\n튀르키예는 최근 몇 년간 주식 시장이 세계에서 가장 많이 올랐지만, 이는 경제가 좋아져서가 아니라 돈을 너무 많이 찍어내 화폐 가치가 폭락했기 때문입니다. 현금으로 돈을 가지고 있으면 가치가 계속 떨어지니 어쩔 수 없이 주식이나 금 같은 실물 자산으로 사람들이 몰려든 것입니다. 정부는 무리한 정책으로 주가를 억지로 떠받치고 있지만, 결과적으로 물가는 감당할 수 없을 정도로 치솟아 중산층은 붕괴하고 서민들은 고통받고 있습니다.\n✅ 핵심 포인트\n· 돈의 가치가 휴지 조각처럼 떨어지니 사람들이 자산을 지키려고 주식과 금을 사면서 주가가 왜곡되어 올랐습니다.\n· 정부가 중앙은행을 압박해 돈을 계속 찍어내면서 인플레이션(물가가 지속적으로 상승하는 현상)이 극심해졌습니다.\n· 건전한 기업 성장이 아닌 화폐 불신에 의한 도피성 투자로 인해 나라 경제는 점점 파탄 나고 있습니다."}, {"date": "2026-07-17", "channel": "한경 글로벌마켓", "title": "[김종학의 뉴욕, 지금-7월17일] 더 깊어진 AI 지출 공포 | 반도체 지수 4% 하락 | 애플-엔비디아 시총 격차 축소 | 구글, 제미나이 출시 차질 |넷플릭스 급락", "url": "", "summary": "📌 한 줄 요약\n인공지능 산업의 투자 대비 성과에 대한 의구심이 커지면서 반도체 관련 주식들이 크게 하락하고 뉴욕 증시가 전반적으로 흔들린 하루였습니다.\n\n💡 쉽게 풀면\n최근 인공지능 기술에 기업들이 막대한 돈을 쓰고 있는데, 실제로 그만큼 돈을 잘 벌어들이고 있는지에 대해 투자자들이 걱정하기 시작했습니다. 이 때문에 반도체 관련 회사들의 주가가 크게 떨어졌고, 구글이나 넷플릭스 같은 대형 기술주들도 실적이나 사업 관련 소식에 따라 주가가 힘을 쓰지 못했습니다. 다만 건강 관련 주식이나 생활 필수품을 만드는 회사들은 비교적 안정적인 모습을 보여주며 시장의 충격을 일 니다 (박진희 부장)", "url": "", "summary": "📌 한 줄 요약\n최근 반도체 주식의 주가 하락은 실적보다는 심리적 요인이 크므로, 지금의 급락을 기회로 삼아 향후 반등을 기다리는 전략이 필요합니다.\n\n💡 쉽게 풀면\n최근 SK하이닉스를 포함한 우리나라 주식 시장이 크게 떨어진 것은 기업이 돈을 못 벌어서가 아니라 투자자들의 불안한 심리와 수급(주식을 사고파는 현황) 문제 때문입니다. 전문가들은 지금의 주가 하락이 기업의 실제 가치보다 과도하게 많이 떨어졌다고 분석하고 있습니다. 따라서 지금 무리하게 주식을 파는 것보다는 실적을 지켜보며 다음 흐름을 기다리는 것이 좋다는 조언입니다.\n\n✅ 핵심 포인트\n· 최근 주가 급락은 기업 실적보다는 시장 분위기와 수급 불안에 의한 것이므로 지나치게 걱정할 필요는 없습니다.\n· SK하이닉스와 같은 주요 종목들은 실적 대비 가격이 저평가된 상태이므로, 특정 가격대를 지지하는지 확인하며 대응하는 것이 중요합니다.\n· 인공지능 관련 투자는 당장 조금 주춤할 수 있어도 거스를 수 없는 흐름이므로 길게 보고 다음 산업인 로봇 분야까지 함께 살펴보는 것이 좋습니다."}, {"date": "2026-07-20", "channel": "전인구경제연구소", "title": "코스피 다시 반등합니다 흔들리지 마세요(ft.염승환 이사 1부)", "url": "", "summary": "📌 한 줄 요약\n최근 주식 시장의 큰 변동성은 반도체 산업에 대한 막연한 의심과 수급 문제 때문이며, 장기적으로는 다시 반등할 가능성이 높습니다.\n💡 쉽게 풀면\n최근 반도체 기업들의 실적이 좋은데도 불구하고 시장은 인공지능 관련 투자가 지속될 수 있을지에 대해 의심하며 주가가 크게 떨어졌습니다. 여기에 개인이 주식을 살 때 쓰는 레버리지(빌린 돈으로 투자하는 방식)와 상장지수펀드(ETF, 특정 지수나 종목의 움직임을 따라가도록 만든 상품)의 영향으로 하락 폭이 더 커졌습니다. 하지만 인공지능 산업은 여전히 발전하고 있고, 반도체 수요는 데이터 센터를 중심으로 계속 늘어날 것이기에 공포에 질려 매도하기보다는 분할 매수 등으로 대응하는 것이 좋습니다.\n✅ 핵심 포인트\n· 주식 시장의 불안은 반도체 산업의 미래와 빅테크 기업의 투자 지속성에 대한 의심 때문에 발생했습니다.\n· 최근의 급락은 펀더멘털(기업의 내재 가치) 문제보다는 수급 쏠림과 레버리지 투자 상품의 영향이 큽니다.\n· 인공지능과 데이터 센터 수요는 여전히 견고하므로, 지금의 변동성을 기회로 삼아 차분하게 대응할 필요가 있습니다."}, {"date": "2026-07-20", "channel": "김작가 TV", "title": "현금 있다면 '이 주식' 꼭 사세요, 7일 뒤 상상 못할 일 터집니다 (박진희 부장)", "url": "", "summary": "📌 한 줄 요약\n반도체 시장이 조정을 거치며 힘든 시기를 겪고 있지만, 우량 기업들을 중심으로 곧 반등할 가능성이 있으니 너무 걱정하지 말고 대응하라는 내용입니다.\n\n💡 쉽게 풀면\n최근 반도체 관련 주식들이 많이 떨어지면서 많은 투자자가 불안해하고 있습니다. 하지만 전문가들은 지금의 하락은 기업의 문제가 아니라 시장 상황에 의한 일시적인 현상으로 보고 있습니다. 삼성전자나 SK하이닉스처럼 실적이 탄탄한 기업들은 결국 다시 오를 힘이 있으니 무작정 팔기보다는 장기적인 관점에서 접근하는 것이 좋습니다. 지금처럼 시장 분위기가 좋지 않을 때는 지수 ETF(여러 기업에 나눠 투자하는 펀드 상품)를 활용해 차분하게 분할 매수하는 전략이 도움이 될 수 있습니다.\n\n✅ 핵심 포인트\n· 반도체 대장주들은 실적이 뒷받침되는 만큼 지금의 하락장을 잘 버티면 충분히 반등할 수 있습니다.\n· 특정 종목 하나만 고르기 어렵다면 시장 전체에 투자하는 지수 ETF 상품을 모아가는 것이 안정적입니다.\n· 기관 투자자들이 주식을 많이 팔아치우는 시기가 오히려 바닥을 확인하는 신호일 수 있으니 너무 공포에 질려 대응하지 마세요."}, {"date": "2026-07-21", "channel": "한경 글로벌마켓", "title": "\"신분증 확인이 어려워?\" 부정선거론 불붙인 트럼프 | 이상은의 워싱턴나우", "url": "", "summary": "📌 한 줄 요약\n트럼프 전 대통령이 제기한 선거 조작 주장과 이를 근거로 추진 중인 신분 확인 강화 법안의 배경 및 현실적인 논란을 다루고 있습니다.\n\n💡 쉽게 풀면\n트럼프 전 대통령은 지난 2020년 미국 대선에 외부 세력이 개입했다는 의혹을 제기하며 투표할 때 신분증 확인을 의무화하는 법안을 강력하게 요구하고 있습니다. 하지만 미국은 한국과 달리 전국적으로 통합된 신분 확인 시스템이 부족해 실제 현장에서 이 법안을 적용하기가 매우 까다롭습니다. 이런 현실적인 문제 때문에 공화당 내부에서도 중간 선거 전에 법안을 시행하기는 어렵다는 목소리가 나오고 있습니다. 결국 이 주장은 선거 시스템의 신뢰를 강조하려는 목적도 있지만, 정치적으로는 지지층을 결집하려는 전략이 섞여 있다는 평가를 받습니다.\n\n✅ 핵심 포인트\n· 트럼프는 중국 등의 개입으로 선거가 조작되었다고 주장하지만 이를 뒷받침할 명확한 결정적 증거는 부족한 상황입니다.\n· 공화당은 투표 시 사진이 있는 신분증 제시를 의무화하는 법안을 추진 중이지만, 미국 내 신분증 미소지자가 많아 위헌 논란이 있습니다.\n· 미국은 선거 관리가 주 정부의 책임이라 연방 차원의 단일 신분 데이터베이스가 없어 법안의 빠른 현장 적용이 현실적으로 어렵습니다."}, {"date": "2026-07-21", "channel": "기릿의 주식노트 Let's Get It", "title": "저는 계속 버팁니다", "url": "", "summary": "채널명: 기릿의 주식노트 Let's Get It\n영상제목: 저는 계속 버팁니다\n게시날짜: 2026년 7월 21일\n\n한 줄 요약\n주식 시장이 큰 폭으로 하락하며 어려운 상황이지만, 시장의 흐름을 분석하며 투자를 이어가겠다는 내용입니다.\n\n쉽게 풀면\n오늘 코스피와 코스닥 지수가 큰 폭으로 떨어지면서 많은 투자자가 힘든 하루를 보냈습니다. 반도체 관련 종목들이 특히 약세를 보였고 시장 전체가 불안정한 모습을 보였습니다. 하지만 영상 제작자는 하락장이 영원할 수는 없다고 믿으며, 현재의 위기가 나중에는 기회가 될 수 있다는 생각으로 버티겠다는 의지를 보여줍니다. 앞으로 미국 시장의 반등과 함께 우리 증시도 다시 활기를 찾기를 기대하고 있습니다.\n\n핵심 포인트\n· 코스피와 코스닥 지수가 4에서 5퍼센트 넘게 크게 하락하는 블랙 먼데이를 겪었습니다.\n· 반도체 관련주들이 악재를 만나 힘을 쓰지 못하는 반면, 전쟁 우려로 인해 사료나 해운 관련주 등은 관심을 받았습니다.\n· 시장은 전반적으로 눈치 보기 장세가 이어지고 있지만, 장기적인 관점에서 현재의 하락을 기회로 삼으려는 노력이 필요합니다."}, {"date": "2026-07-21", "channel": "기릿의 주식노트 Let's Get It", "title": "\"삼전 닉스와 달라\" 강력한 목표가.. 그 이유는?", "url": "", "summary": "📌 한 줄 요약\n현재 반도체와 증시가 어려운 상황이지만 향후 반등을 위해 주목해야 할 시장 신호와 투자 유망 분야를 정리한 영상입니다.\n\n💡 쉽게 풀면\n주식 시장이 좋지 않지만, 전문가들은 지금이 공포감에 흔들릴 때가 아니라 냉정하게 대응할 시기라고 조언합니다. 특히 반도체는 관련 기업들의 실적뿐만 아니라 빅테크 기업들의 투자 움직임을 함께 살펴봐야 반등 가능성을 정확히 읽을 수 있습니다. 증시는 최악의 상황을 가정해도 더 이상 크게 빠질 곳이 없는 지점까지 왔으며, 지금 같은 시기에는 선별적인 종목 선택이 중요합니다.\n\n✅ 핵심 포인트\n· 반도체 주가가 다시 오르려면 빅테크 기업들의 실적이 좋아지고, 그들이 인공지능 분야에 투자를 계속 늘리는지 확인해야 합니다.\n· 코스피(국내 증시 전체의 흐름을 나타내는 지수)는 현재 바닥권에 근접해 있지만, 반등하더라도 과거처럼 바로 치고 올라가기보다는 박스권에서 움직 function initChips(){

  const mk = (label, val) => {
    const el = document.createElement('span');
    el.className = 'chip' + ((val===chan)||(val===null&&chan===null)?' on':'');
    el.textContent = label;
    el.onclick = ()=>{ chan = val; initChips(); renderList(); };

  };
  box.innerHTML='';

  const cls = chg>=0?'up':'dn';
  const sign = chg>=0?'+':'';
  return `코스피 <b class="${cls}">${k.c.toLocaleString()} (${sign}${chg.toFixed(2)})</b>`;
}
function renderList(){
  let items = D.briefings.slice();
  if(chan) items = items.filter(b=>b.channel===chan);
  if(selDate) items = items.filter(b=>b.date===selDate);

  const note = document.getElementById('selnote');
  note.innerHTML = selDate
    ? `<div class="selnote">📌 ${selDate} 선택됨 · <a href="#" onclick="selDate=null;drawChart();renderList();return false">전체 보기</a></div>`
    : '';

  const groups = {};
  items.forEach(b=>{(groups[b.date]=groups[b.date]||[]).push(b)});
  const dates = Object.keys(groups).sort().reverse();
  const box = document.getElementById('list');
  if(dates.length===0){ box.innerHTML='<div class="empty">해당하는 기록이 없습니다</div>'; return; }

  let h='';
  dates.forEach(d=>{
    h += `<div class="dayhead"><span class="d">${d}</span><span class="k">${groups[d].length}건 · ${kospiNote(d)}</span></div>`;
    groups[d].forEach((b,i)=>{
      const id = 'b-'+d+'-'+i;
      const titleHtml = b.url ? `<a href="${esc(b.url)}" target="_blank">${esc(b.title)}</a>` : esc(b.title);
      h += `<div class="item" id="${id}">
        <div class="ch">${esc(b.channel)}</div>
        <div class="ti">${titleHtml}</div>
        ${b.summary ? `<span class="tg" onclick="document.getElementById('${id}').classList.toggle('open')">요약 펼치기 ▾</span><div class="sm">${esc(b.summary)}</div>` : ''}
      </div>`;
    });
  });
  box.innerHTML = h;
}

drawChart(); initChips(); renderList();
</script>
</body>
</html>
