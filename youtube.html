07-13", "channel": "경제 읽어주는 남자(김광석TV)", "title": "AI가 미래를 맞힌다는 착각? 돈 잃지 않으려면 반드시 알아야 할 51%의 법칙 | 경읽남과 토론합시다 | 이시한 교수님 [3편]", "url": "", "summary": "📌 한 줄 요약\nAI가 미래를 완벽하게 예측할 수 있다는 착각에서 벗어나, 인간이 주도적으로 판단하고 책임지는 공동지능의 자세가 필요하다는 내용입니다.\n\n💡 쉽게 풀면\n많은 사람이 AI가 미래를 알려줄 것이라고 믿고 투자나 인생 계획을 전적으로 맡기곤 합니다. 하지만 기술은 예상치 못한 방향으로 급변하기 때문에, AI가 내놓은 일반적인 정보만 믿는 것은 매우 위험합니다. 따라서 AI는 보조 도구로 활용하되, 본인의 상황에 맞춰 스스로 생각하고 최종 판단을 내리는 능력을 키워야 합니다. 이렇게 인간과 AI가 협력하여 대응력을 높이는 것을 공동지능이라고 부릅니다.\n\n✅ 핵심 포인트\n· 미래는 예측하는 것이 아니라 급변하는 기술에 맞춰 대응력을 기르는 것이 중요합니다.\n· AI는 보편적인 정보만 제공할 뿐 개인의 구체적인 상황이나 돌발 변수는 알지 못합니다.\n· AI의 결과를 그대로 수용하기보다 사람이 최종적으로 검증하고 판단하는 책임이 반드시 필요합니다."}, {"date": "2026-07-15", "channel": "경제 읽어주는 남자(김광석TV)", "title": "경제는 호황이라는데 왜 나만 힘들까? K자형 양극화의 진짜 현실 | 김광석의 북리뷰 | 어떻게 살아낼 것인가 [1편]", "url": "", "summary": "📌 한 줄 요약\n경제 지표는 호황을 가리키는데 실제 내 삶은 왜 힘든지에 대한 이유를 살펴보고, 어려운 시기를 이겨낼 마음가짐을 공유하는 영상입니다.\n\n💡 쉽게 풀면\n반도체 같은 특정 산업만 수출이 잘 되면서 전체적인 경제 지표는 좋아 보이지만, 정작 대다수 중소기업이나 일반 근로자는 경기 회복을 느끼기 어려운 불균형이 나타나고 있습니다. 이를 산업과 기업 간의 격차가 벌어지는 케이(K)자형 양극화라고 합니다. 이런 상황에서 저자는 남들이 말하는 호황에 흔들리기보다 나만의 의미 있는 일을 찾고 삶의 절벽을 마주했을 때 그것을 어떻게 극복할지에 대해 조언합니다.\n\n✅ 핵심 포인트\n· 대기업과 일부 수출 산업만 돈을 벌면서 일반 사람들이 느끼는 체감 경기는 여전히 차갑습니다.\n· 경제가 어려운 시대일수록 내가 좋아하거나 현재 하는 일에서 가치를 찾는 것이 중요합니다.\n· 삶에서 겪는 실패와 안개 같은 혼란은 내 잘못이 아니니 스스로를 위로하며 나아가는 태도가 필요합니다."}, {"date": "2026-07-15", "channel": "전인구경제연구소", "title": "노후 준비 지금부터 준비해야 됩니다. 비트코인 모으세요(ft.박종한 작가 1부)", "url": "", "summary": "📌 한 줄 요약\n노후 준비를 위해 비트코인을 중심으로 알트코인까지 활용하는 효율적인 자산 배분 전략을 다루고 있습니다.\n\n💡 쉽게 풀면\n은퇴를 준비할 때 단순히 현금만 모으는 것보다 비트코인 같은 가상자산을 포트폴리오에 넣으면 더 효과적일 수 있습니다. 다만 알트코인(비트코인을 제외한 나머지 가상자산)은 변동성이 매우 크기 때문에 무작정 투자하기보다 기술력이나 쓰임새를 따져보고 신중하게 골라야 합니다. 또한 코인을 단순히 보유만 하는 것이 아니라 스테이킹(가상자산을 예치하고 이자처럼 보상을 받는 것)을 활용하면 복리 효과를 통해 자산을 더 빠르게 불릴 수도 있습니다. 무리한 투자보다는 전체 자산의 적정 비율을 지키면서 안전하게 장기적으로 접근하는 것이 중요합니다.\n\n✅ 핵심 포인트\n· 가상자산 투자는 변동성이 크므로 무작정 따라 하기보다는 펀더멘털(기업의 재무 상태나 기술적 가치)을 꼼꼼히 확인해야 합니다.\n· 가상자산을 예치하고 이자를 받는 스테이킹을 적절히 활용하면 자산을 늘리는 데 큰 도움이 될 수 있습니다.\n· 큰 수익을 쫓는 고위험 투자보다는 안정적인 비트코인을 중심으로 자산의 비중   }];
  const layout2 = {
    paper_bgcolor:'#fbf8f0', plot_bgcolor:'#fbf8f0',
    font:{color:'#3d3529', size:11},
    height: 150, hovermode:'x unified', dragmode:'pan', showlegend:false,
    margin:{l:50,r:46,t:2,b:34},
    xaxis: Object.assign({}, XAXIS_BASE),   // 여기에 날짜 표시
    yaxis:{ title:'영상 수', gridcolor:'rgba(61,53,41,0.08)', fixedrange:true, rangemode:'tozero' },
  };

  Plotly.newPlot('chart1', t1, layout1, CONFIG).then(gd1 => {
    Plotly.newPlot('chart2', t2, layout2, CONFIG).then(gd2 => {

      // 보이는 X 구간에 맞춰 코스피 Y축 자동 맞춤 (지표 페이지의 autoFitY와 동일 원리)
      function autoFitY(){
        const xr = gd1.layout.xaxis.range;
        if(!xr) return;
        const x0 = new Date(xr[0]).getTime(), x1 = new Date(xr[1]).getTime();
        let lo = Infinity, hi = -Infinity;
        kd.forEach(d=>{
          const t = new Date(d).getTime();
          if(t >= x0 && t <= x1){
            lo = Math.min(lo, D.kospi[d].l);
            hi = Math.max(hi, D.kospi[d].h);
          }
        });
        if(lo === Infinity) return;
        const pad = (hi - lo) * 0.08 || hi * 0.01;
        Plotly.relayout(gd1, {'yaxis.range': [lo - pad, hi + pad]});
      }

      // 한쪽 차트를 움직이면 다른 쪽 X 범위도 따라오게 동기화
      function syncFrom(src, dst){
        src.on('plotly_relayout', ev=>{
          if(syncing) return;
          let upd = null;
          if(ev['xaxis.autorange']){ upd = {'xaxis.autorange': true}; }
          else if(ev['xaxis.range[0]'] !== undefined){
            upd = {'xaxis.range': [ev['xaxis.range[0]'], ev['xaxis.range[1]']]};
          } else if(ev['xaxis.range']){
            upd = {'xaxis.range': ev['xaxis.range']};
          }
          if(upd){
            syncing = true;
            Plotly.relayout(dst, upd).then(()=>{ syncing = false; });
            setTimeout(autoFitY, 60);
          }
        });
      }
      syncFrom(gd1, gd2);
      syncFrom(gd2, gd1);
      autoFitY();

      // 막대 클릭 → 그날 브리핑 필터
      gd2.on('plotly_click', ev=>{
        const p = ev.points && ev.points[0];
        if(!p) return;
        const d = String(p.x).slice(0,10);
        if(counts[d]){
          selDate = (selDate===d)?null:d;
          // 막대 색만 갱신 (차트 전체 다시 안 그림)
          Plotly.restyle(gd2, {'marker.color': [bd.map(x=> x===selDate ? '#e08a4e' : 'rgba(224,138,78,0.55)')]});
          renderList();
        }
      });
    });
  });
}

// ---- 채널 칩 ----
function initChips(){
  const box = document.getElementById('chips');
  const chans = [...new Set(D.briefings.map(b=>b.channel).filter(Boolean))];
  const mk = (label, val) => {
    const el = document.createElement('span');
    el.className = 'chip' + ((val===chan)||(val===null&&chan===null)?' on':'');
    el.textContent = label;
    el.onclick = ()=>{ chan = val; initChips(); renderList(); };
    return el;
  };
  box.innerHTML='';
  box.appendChild(mk('전체', null));
  chans.forEach(c=>box.appendChild(mk(c, c)));
  document.getElementById('fl').textContent = chan || '전체';
}

// ---- 목록 ----
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function kospiNote(d){
  const k = D.kospi[d];
  if(!k) return '';
  const chg = k.c - k.o;
  const cls = chg>=0?'up':'dn';
  const sign = chg>=0?'+':'';
  return `코스피 <b class="${cls}">${k.c.toLocaleString()} (${sign}${chg.toFixed(2)})</b>`;
}
function renderList(){
  let items = D.briefings.slice();
  if(chan) items = items.filter(b=>b.channel===chan);
  if(selDate) items = items.filter(b=>b.date===selDate);

  const note = document.getElementById('selnote');
  note.innerHTML = selDate
    ? `<div class="selnote">📌 ${selDate} 선택됨 · <a href="#" onclick="selDate=null;drawChart();renderList();return false">전체 보기</a></div>`
    : '';

  const groups = {};
  items.forEach(b=>{(groups[b.date]=groups[b.date]||[]).push(b)});
  const dates = Object.keys(groups).sort().reverse();
  const box = document.getElementById('list');
  if(dates.length===0){ box.innerHTML='<div class="empty">해당하는 기록이 없습니다</div>'; return; }

  let h='';
  dates.forEach(d=>{
    h += `<div class="dayhead"><span class="d">${d}</span><span class="k">${groups[d].length}건 · ${kospiNote(d)}</span></div>`;
    groups[d].forEach((b,i)=>{
      const id = 'b-'+d+'-'+i;
      const titleHtml = b.url ? `<a href="${esc(b.url)}" target="_blank">${esc(b.title)}</a>` : esc(b.title);
      h += `<div class="item" id="${id}">
        <div class="ch">${esc(b.channel)}</div>
        <div class="ti">${titleHtml}</div>
        ${b.summary ? `<span class="tg" onclick="document.getElementById('${id}').classList.toggle('open')">요약 펼치기 ▾</span><div class="sm">${esc(b.summary)}</div>` : ''}
      </div>`;
    });
  });
  box.innerHTML = h;
}

drawChart(); initChips(); renderList();
</script>
