<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; }
  body {
    background:#f5f0e4; color:#3d3529;
    font-family:'Pretendard','Malgun Gothic',-apple-system,'Segoe UI',sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; padding:24px; gap:16px;
  }
  .btns { display:flex; flex-direction:column; gap:16px; width:100%; max-width:400px; }
  a.big {
    display:flex; align-items:center; gap:14px; text-decoration:none;
    background:#fbf8f0; color:#3d3529; border:1.5px solid rgba(61,53,41,0.15);
    border-radius:18px; padding:22px; box-shadow:0 3px 8px rgba(61,53,41,0.08);
    transition:transform .12s;
  }
  a.big:active { transform:scale(0.97); }
  a.big .ico { font-size:32px; }
  a.big .tx b { display:block; font-size:17.5px; font-weight:800; }
  a.big .tx span { font-size:12.5px; color:#8a7f6d; }
  a.big.orange { background:#e08a4e; border-color:#e08a4e; color:#fff; }
  a.big.orange .tx span { color:rgba(255,255,255,0.85); }
</style>
</head>
<body>
  <div class="btns">

    </a>
    <a class="big" href="scanner.html">
      <span class="ico">🔎</span>

    <a class="big" href="recommend.html">
