<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; background:#f5f0e4; color:#3d3529;

  /* 따뜻한 크림 + 오렌지 테마 */

  .title { text-align:center; font-size:18px; font-weight:800; padding:16px 8px 4px;
    color:#3d3529; letter-spacing:-0.3px; }
  .bar { text-align:center; padding:12px 8px; display:flex; justify-content:center;
    gap:10px; align-items:center; flex-wrap:wrap; }
  .tf-btn { background:#ffffff; color:#3d3529; border:1.5px solid rgba(61,53,41,0.15);
    padding:11px 20px; border-radius:14px; font-size:15px; font-weight:600; cursor:pointer;
    box-shadow:0 2px 5px rgba(61,53,41,0.08); transition:all .15s;
    -webkit-tap-highlight-color:transparent; }
  .tf-btn:hover { background:#fdf8ef; transform:translateY(-1px); }
  .tf-btn.active { background:#e08a4e; color:#ffffff; border-color:#e08a4e;
    box-shadow:0 3px 8px rgba(224,138,78,0.35); }
  #fs-btn { background:#ffffff; color:#8a7f6d; border:1.5px solid rgba(61,53,41,0.15);

    box-shadow:0 2px 5px rgba(61,53,41,0.08); }
  #fs-btn:hover { background:#fdf8ef; }
  .hint { text-align:center; font-size:1px; color:transparent; padding:0; margin:0; height:0; }

  .legend { display:flex; justify-content:center; align-items:center; gap:24px;
    padding:2px 6px 4px; font-size:13px; font-weight:600; color:#37352f; }
  /* 차트 제목 (HTML) */
  .ctitle { text-align:center; font-size:15px; font-weight:700; color:#3d3529;
    padding:2px 8px 2px; }
  .legend-top { padding-bottom:0; padding-top:0; margin-bottom:-4px; }
  .legend-mid { padding-top:2px; padding-bottom:2px; }
  #chart-wrap { position:relative; width:100%; }
  /* 종목수 차트의 제목+범례를 두 차트 사이 공간에 겹쳐 배치 */
  .mid-overlay { position:absolute; left:0; right:0; z-index:5;
    background:#f5f0e4; pointer-events:none; }
  .mid-overlay .ctitle { padding:2px 8px 0; }
  .legend .li { display:inline-flex; align-items:center; }
  .legend .sq { width:12px; height:12px; border-radius:2px; margin-right:4px; }
  .legend .ln { width:20px; border-top:3px solid #d97706; margin-right:4px; }
  /* 코스피 캔들 모양 기호 */
  .legend .candle { position:relative; width:11px; height:16px; margin-right:5px;
    display:inline-block; }
  .legend .candle .wick { position:absolute; left:5px; top:0; width:1.5px; height:16px;
    background:#b91c1c; }
  .legend .candle .body { position:absolute; left:1px; top:4px; width:9px; height:8px;
    background:#ef4444; border:1px solid #b91c1c; border-radius:1px; }
  #chart { width:100%; border-radius:16px; overflow:hidden; touch-action:none; }
  /* 커스텀 탭 툴팁 */
  #tap-tip { display:none; position:fixed; z-index:1001; background:#ffffff;
    border:1px solid rgba(55,53,47,0.25); border-radius:10px;
    box-shadow:0 4px 14px rgba(0,0,0,0.15); padding:10px 12px;
    font-size:13px; line-height:1.7; color:#37352f; pointer-events:none;
    min-width:150px; }
  #tap-tip .tt-date { font-weight:700; border-bottom:1px solid rgba(55,53,47,0.12);
    padding-bottom:4px; margin-bottom:5px; }
  #tap-tip .up { color:#dc2626; } #tap-tip .dn { color:#2563eb; }

  /* 전체화면 모드 */
  body.fullscreen #live-banner,
  body.fullscreen .title,
  body.fullscreen .hint { display:none; }
  body.fullscreen .legend { display:none; }
  body.fullscreen .bar { padding:5px; position:fixed; top:6px; right:6px; z-index:1000;
    background:rgba(250,246,236,0.95); border-radius:14px;
    box-shadow:0 3px 10px rgba(61,53,41,0.18); }
  body.fullscreen #chart { position:fixed; inset:0; width:100vw; height:100vh;
    background:#f5f0e4; border-radius:0; }

  @media (max-width:600px) {
    #live-banner { font-size:13px; padding:9px 8px; }
    .title { font-size:16px; }
    .tf-btn, #fs-btn { padding:12px 14px; font-size:14px; }
  }
</style>

function chartHeight() {

let fitting = false;  // 무한루프 방지 플래그

function autoFitY(gd, xrOverride, immediate) {
  if (fitting) return;
  const candle = gd.data.find(t => t.type === 'candlestick');
  if (!candle) return;
  const xr = xrOverride || gd.layout.xaxis.range;
  if (!xr) return;
  const t0 = new Date(xr[0]).getTime();
  const t1 = new Date(xr[1]).getTime();

  // 시간축을 숫자로 사전 캐시 (한 번만)
  if (!gd._ct) gd._ct = candle.x.map(x => new Date(x).getTime());
  const ct = gd._ct;

  // 보이는 구간의 캔들 min/max
  let lo = Infinity, hi = -Infinity;
  for (let i = 0; i < ct.length; i++) {
    if (ct[i] >= t0 && ct[i] <= t1) {
      if (candle.low[i]  < lo) lo = candle.low[i];
      if (candle.high[i] > hi) hi = candle.high[i];
    }
  }
  if (!isFinite(lo)) return;
  const pad = (hi - lo) * 0.06 || 1;

  // 보이는 구간의 종목수 max
  const bars = gd.data.filter(t => t.type === 'bar');
  let cmax = 0;
  if (bars.length >= 2) {
    for (let i = 0; i < ct.length; i++) {
      if (ct[i] >= t0 && ct[i] <= t1) {
        const s = (bars[0].y[i] || 0) + (bars[1].y[i] || 0);
        if (s > cmax) cmax = s;
      }
    }
  }

  const yRange = [lo - pad, hi + pad];
  const y3Range = cmax > 0 ? [0, cmax * 1.1] : null;
  if (immediate) {
    // 제스처 중: 내부 값만 세팅 (relayout은 rAF 루프가 일괄 처리 → 빠름)
    gd.layout.yaxis.range = yRange;
    if (y3Range && gd.layout.yaxis3) gd.layout.yaxis3.range = y3Range;
    return;
  }
  fitting = true;
  const upd = {'yaxis.range': yRange};
  if (y3Range) upd['yaxis3.range'] = y3Range;
  Plotly.relayout(gd, upd).then(() => { fitting = false; });
}

  fig.layout.dragmode = 'pan';
  if (IS_MOBILE || document.body.classList.contains('fullscreen')) {
    fig.layout.margin = {l:46, r:46, t:4, b:44};
  }
  fig.layout.showlegend = false;  // 커스텀 HTML 범례 사용
  // 모바일: Plotly 자체 hover 완전 차단 (탭 시 커스텀 툴팁만 사용)
  if (IS_MOBILE) fig.layout.hovermode = false;

  // ── 키움 스타일 축 설정 ──
  const candle = fig.data.find(t => t.type === 'candlestick');
  // X축 범위 제한은 JS의 anchorRight()가 전담 (이중 제한 시 튕김 방지)
  // Y축: 사용자가 직접 못 움직임 (자동 스케일만)
  fig.layout.yaxis  = Object.assign({}, fig.layout.yaxis,  {fixedrange: true});
  fig.layout.yaxis2 = Object.assign({}, fig.layout.yaxis2, {fixedrange: true, range: [0, 100]});
  if (fig.layout.yaxis3) {
    fig.layout.yaxis3 = Object.assign({}, fig.layout.yaxis3, {fixedrange: true});
  }

  // 모바일: Plotly 터치 비활성 → 우리가 직접 제어
  if (IS_MOBILE) fig.layout.dragmode = false;

  Plotly.react('chart', fig.data, fig.layout, CONFIG).then(gd => {
    gd._ct = null;   // ✅ 봉 전환 시 시간축 캐시 초기화 (Y 자동스케일 오류 방지)
    setTimeout(() => positionMidLegend(gd), 30);
    if (gd.removeAllListeners) {
      gd.removeAllListeners('plotly_relayout');
      gd.removeAllListeners('plotly_relayouting');
    }

    const candleTimes = candle.x.map(x => new Date(x).getTime());
    // 봉 간격(중앙값) → 최대 확대 = 5봉까지만
    const _diffs = [];
    for (let i = 1; i < candleTimes.length; i++) _diffs.push(candleTimes[i] - candleTimes[i-1]);
    _diffs.sort((a, b) => a - b);
    const barMs = _diffs.length ? _diffs[Math.floor(_diffs.length / 2)] : 3600 * 1000;
    // ✅ 팬/줌 한계에 반 봉 여유 → 첫/마지막 봉이 잘리지 않음
    const dataXmin = candleTimes[0] - barMs * 0.6;
    const dataXmax = candleTimes[candleTimes.length - 1] + barMs * 0.6;

    function getXR() {
      const r = gd.layout.xaxis.range;
      return [new Date(r[0]).getTime(), new Date(r[1]).getTime()];
    }
    function toISO(t) { return new Date(t).toISOString().replace('T',' ').slice(0,19); }

    // 클램프만 담당 (그리기는 rAF 루프가)
    function clampXR(t0, t1) {
      let span = t1 - t0;
      const minSpan = barMs * 5;                 // 최대 확대 = 5봉
      const maxSpan = dataXmax - dataXmin;
      if (span < minSpan) { span = minSpan; t0 = t1 - span; }
      if (span > maxSpan) { span = maxSpan; }
      if (t1 > dataXmax) { t1 = dataXmax; t0 = t1 - span; }
      if (t0 < dataXmin) { t0 = dataXmin; t1 = Math.min(t0 + span, dataXmax); }
      return [t0, t1];
    }

    // ── 부드러운 실시간 렌더링: 최신 목표만 저장, rAF 루프가 계속 그림 ──
    let pendingXR = null;      // 다음에 그릴 목표 범위
    let rafLoopOn = false;
    let relayoutBusy = false;  // relayout 진행 중 플래그
    function pumpRAF() {
      // relayout이 아직 처리 중이면 이번 프레임은 건너뛰고 다음 프레임에 최신값 반영
      if (relayoutBusy) { requestAnimationFrame(pumpRAF); return; }
      if (!pendingXR) { rafLoopOn = false; return; }
      const [t0, t1] = pendingXR;
      pendingXR = null;
      const iso = [toISO(t0), toISO(t1)];

      // X + Y 범위를 한 번의 relayout으로 동시 적용 (호출 횟수 최소화)
      const yr = computeY(t0, t1);
      const upd = {'xaxis.range': iso};
      if (yr) { upd['yaxis.range'] = yr.y; if (yr.y3) upd['yaxis3.range'] = yr.y3; }

      fitting = true;
      relayoutBusy = true;
      Plotly.relayout(gd, upd).then(() => {
        fitting = false;
        relayoutBusy = false;
      });
      requestAnimationFrame(pumpRAF);
    }
    function setXR(t0, t1) {
      pendingXR = clampXR(t0, t1);
      if (!rafLoopOn) { rafLoopOn = true; requestAnimationFrame(pumpRAF); }
    }

    // Y 범위 계산만 분리 (relayout은 pumpRAF가 X와 합쳐서 1회 호출)
    function computeY(t0, t1) {
      if (!gd._ct) gd._ct = candle.x.map(x => new Date(x).getTime());
      const ct = gd._ct;
      let lo = Infinity, hi = -Infinity;
      for (let i = 0; i < ct.length; i++)
        if (ct[i] >= t0 && ct[i] <= t1) {
          if (candle.low[i] < lo) lo = candle.low[i];
          if (candle.high[i] > hi) hi = candle.high[i];
        }
      if (!isFinite(lo)) return null;
      const pad = (hi - lo) * 0.06 || 1;
      const bars = gd.data.filter(tr => tr.type === 'bar');
      let cmax = 0;
      if (bars.length >= 2)
        for (let i = 0; i < ct.length; i++)
          if (ct[i] >= t0 && ct[i] <= t1) {
            const s = (bars[0].y[i] || 0) + (bars[1].y[i] || 0);
            if (s > cmax) cmax = s;
          }
      return { y: [lo - pad, hi + pad], y3: cmax > 0 ? [0, cmax * 1.1] : null };
    }

    if (IS_MOBILE) {
      // ── 커스텀 터치: 한손가락=이동, 두손가락=우측고정 줌 ──
      let touchState = null;
      const plotArea = gd;

      function dist(t) {
        const dx = t[0].clientX - t[1].clientX;
        const dy = t[0].clientY - t[1].clientY;
        return Math.hypot(dx, dy);
      }

      // 탭 시 수동 툴팁: 가장 가까운 봉 찾기
      const candleIdx = gd.data.findIndex(t => t.type === 'candlestick');
      const ratioIdx  = gd.data.findIndex(t => t.type === 'scatter');

      function nearestIdx(t) {
        let lo = 0, hi = candleTimes.length - 1;
        while (lo < hi) {
          const mid = (lo + hi) >> 1;
          if (candleTimes[mid] < t) lo = mid + 1; else hi = mid;
        }
        if (lo > 0 && Math.abs(candleTimes[lo-1] - t) < Math.abs(candleTimes[lo] - t)) lo--;
        return lo;
      }

      function showTapInfo(clientX, clientY) {
        try {
          const rect = gd.getBoundingClientRect();
          const fl = gd._fullLayout;
          const xa = fl.xaxis, ya = fl.yaxis, ya3 = fl.yaxis3;

          const px = clientX - rect.left - xa._offset;
          if (px < 0 || px > xa._length) return;
          const t = new Date(xa.p2d(px)).getTime();
          const idx = nearestIdx(t);
          if (Math.abs(t - candleTimes[idx]) > barMs * 0.55) return;

          // ── 아래(종목수) 차트 영역 탭? ──
          if (ya3) {
            const py3 = clientY - rect.top - ya3._offset;
            if (py3 >= 0 && py3 <= ya3._length) {
              const bars = gd.data.filter(tr => tr.type === 'bar');
              if (bars.length >= 2) {
                const hiCnt = bars[0].y[idx], loCnt = bars[1].y[idx];
                if (!isFinite(hiCnt) || !isFinite(loCnt)) return;
                const v3 = ya3.p2d(py3);
                const tol3 = Math.abs(ya3.p2d(py3 + 14) - v3);
                if (v3 > hiCnt + loCnt + tol3) return;  // 막대 위 빈 공간 → 무시
                renderTip(clientX, clientY,
                  '<div class="tt-date">' + String(candle.x[idx]).slice(0,10) + '</div>' +
                  '신고가 <span class="up">' + Math.round(hiCnt) + '개</span><br>' +
                  '신저가 <span class="dn">' + Math.round(loCnt) + '개</span>');
              }
              return;
            }
          }

          // ── 위(코스피) 차트 영역 ──
          const py = clientY - rect.top - ya._offset;
          if (py < 0 || py > ya._length) return;
          const v = ya.p2d(py);

          // ✅ 캔들 몸통 판정: 세로로 저가~고가 범위(약간 여유)
          const lo = candle.low[idx], hi = candle.high[idx];
          if (!isFinite(lo) || !isFinite(hi) || !isFinite(v)) return;  // 데이터 이상 시 거부
          const tol = Math.abs(ya.p2d(py + 12) - v);   // 12픽셀 허용 오차
          if (v < lo - tol || v > hi + tol) return;    // 빈 공간 터치 → 무시

          // ── 코스피 캔들 툴팁 ──
          const o = candle.open[idx], h = candle.high[idx],
                l = candle.low[idx],  c = candle.close[idx];
          const up = c >= o;
          const ratioVal = (ratioIdx >= 0) ? gd.data[ratioIdx].y[idx] : null;
          const f = n => Number(n).toLocaleString('ko-KR', {maximumFractionDigits: 2});
          const dateStr = String(candle.x[idx]).slice(0, 16).replace('T',' ');
          renderTip(clientX, clientY,
            '<div class="tt-date">' + dateStr + '</div>' +
            '시가 ' + f(o) + '<br>' +
            '고가 <span class="up">' + f(h) + '</span><br>' +
            '저가 <span class="dn">' + f(l) + '</span><br>' +
            '종가 <span class="' + (up ? 'up' : 'dn') + '">' + f(c) + (up ? ' ▲' : ' ▼') + '</span>' +
            (ratioVal !== null ? '<br>비율 <b>' + f(ratioVal) + '%</b>' : ''));
        } catch (err) { /* 무시 */ }
      }

      function renderTip(clientX, clientY, html) {
        const tip = document.getElementById('tap-tip');
        tip.innerHTML = html;
        tip.style.display = 'block';
        const tw = tip.offsetWidth, th = tip.offsetHeight;
        let tx = clientX + 14, ty = clientY - th - 14;
        if (tx + tw > window.innerWidth - 6) tx = clientX - tw - 14;
        if (tx < 6) tx = 6;
        if (ty < 6) ty = clientY + 18;
        tip.style.left = tx + 'px';
        tip.style.top  = ty + 'px';
      }

      function hideTip() {
        const tip = document.getElementById('tap-tip');
        if (tip) tip.style.display = 'none';
      }

      plotArea.addEventListener('touchstart', e => {
        hideTip();                                 // 제스처 시작 시 툴팁 제거
        const [r0, r1] = getXR();
        if (e.touches.length === 2) {
          touchState = { mode:'pinch', d0: dist(e.touches), r0, r1 };
        } else if (e.touches.length === 1) {
          touchState = {
            mode:'pan', x0: e.touches[0].clientX, r0, r1,
            tapX: e.touches[0].clientX, tapY: e.touches[0].clientY,
            tapT: Date.now(), moved: false
          };
        }
        e.preventDefault();                        // Plotly 기본 터치(툴팁 등) 완전 차단
      }, {passive:false});

      plotArea.addEventListener('touchmove', e => {
        if (!touchState) return;
        e.preventDefault();

        if (touchState.mode === 'pinch' && e.touches.length === 2) {
          const d = dist(e.touches);
          if (Math.abs(d - touchState.d0) < PINCH_THRESHOLD) return;  // 미세 변화 무시
          // ✅ 감도 적용: 거리비를 ZOOM_SENSITIVITY 지수로 증폭 → 더 예민
          const ratio = touchState.d0 / d;
          const scale = Math.pow(ratio, ZOOM_SENSITIVITY);
          const newSpan = (touchState.r1 - touchState.r0) * scale;
          const R1 = touchState.r1;                // ✅ 우측(최신) 항상 고정
          setXR(R1 - newSpan, R1);
        } else if (touchState.mode === 'pan' && e.touches.length === 1) {
          const px = e.touches[0].clientX - touchState.x0;
          if (!touchState.moved && Math.abs(px) < DRAG_THRESHOLD) return;  // 탭은 무시
          touchState.moved = true;
          const w = gd.clientWidth || 360;
          const span = touchState.r1 - touchState.r0;
          const dt = -px / w * span * PAN_SENSITIVITY;
          setXR(touchState.r0 + dt, touchState.r1 + dt);
        }
      }, {passive:false});

      plotArea.addEventListener('touchend', e => {
        if (touchState && touchState.mode === 'pan'
            && !touchState.moved
            && Date.now() - touchState.tapT < 350) {
          // ✅ 움직임 없는 짧은 탭 → 그때만 정보 표시
          showTapInfo(touchState.tapX, touchState.tapY);
        }
        if (e.touches.length === 0) touchState = null;
        else if (e.touches.length === 1) {
          const [r0, r1] = getXR();
          touchState = { mode:'pan', x0: e.touches[0].clientX, r0, r1,
                         tapX: e.touches[0].clientX, tapY: e.touches[0].clientY,
                         tapT: Date.now(), moved: true };
        }
      });
    } else {
      // ── PC: Plotly 기본 팬/휠줌 + 실시간 Y보정 + 범위 클램프 ──
      let rafPending = false;
      gd.on('plotly_relayouting', ev => {
        const r0 = ev['xaxis.range[0]'], r1 = ev['xaxis.range[1]'];
        if (r0 === undefined) return;
        if (rafPending) return;
        rafPending = true;
        requestAnimationFrame(() => {
          rafPending = false;
          autoFitY(gd, [r0, r1]);
        });
      });
      gd.on('plotly_relayout', ev => {
        if (fitting) return;
        if (ev['xaxis.autorange']) { setTimeout(() => autoFitY(gd), 50); return; }
        const r0 = ev['xaxis.range[0]'], r1 = ev['xaxis.range[1]'];
        if (r0 !== undefined) {
          setXR(new Date(r0).getTime(), new Date(r1).getTime());
        }
      });
    }

    autoFitY(gd);  // 첫 화면도 보이는 구간에 맞춤
  });

  document.querySelectorAll('.tf-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tf === tf));
}

function toggleFull() {
  const body = document.body;
  const el = document.documentElement;
  if (!body.classList.contains('fullscreen')) {
    body.classList.add('fullscreen');
    document.getElementById('fs-btn').textContent = '✕ 닫기';
    // 실제 브라우저 전체화면 + 가로모드 시도 (모바일)
    if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(()=>{});
    }
  } else {
    body.classList.remove('fullscreen');
    document.getElementById('fs-btn').textContent = '⛶ 전체화면';
    if (document.exitFullscreen && document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    if (screen.orientation && screen.orientation.unlock) {
      try { screen.orientation.unlock(); } catch(e){}
    }
  }
  setTimeout(() => switchTF(currentTF), 150);
}

// 전체화면 ESC로 빠져나올 때 동기화
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && document.body.classList.contains('fullscreen')) {
    document.body.classList.remove('fullscreen');
    document.getElementById('fs-btn').textContent = '⛶ 전체화면';
    setTimeout(() => switchTF(currentTF), 150);
  }
});

// 신저가/신고가 범례를 종목수 차트(아래) 상단에 정확히 배치
function positionMidLegend(gd) {
  try {
    const fl = gd._fullLayout;
    const ov = document.getElementById('mid-overlay');
    if (!fl || !fl.yaxis3 || !ov) return;
    // 종목수 차트(yaxis3) 상단 바로 위에 제목+범례 배치
    const topPx = fl.yaxis3._offset;
    ov.style.top = (topPx - ov.offsetHeight) + 'px';
    ov.style.display = 'block';
  } catch (e) {}
}

switchTF(currentTF);

window.addEventListener('resize', () => switchTF(currentTF));

// 실시간 배너
const LIVE_URL = "https://raw.githubusercontent.com/kimddubuck/stock-indicator/main/live.json";
async function updateLive() {
  try {
    const r = await fetch(LIVE_URL + "?t=" + Date.now(), {cache:"no-store"});
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    const pct = (d.ratio*100).toFixed(2);
    let color = "#15803d";
    if (d.ratio < 0.10) color = "#dc2626";
    else if (d.ratio < 0.15) color = "#ea580c";
    else if (d.ratio < 0.20) color = "#ca8a04";
    document.getElementById("live-banner").innerHTML =
      '📡 <b>실시간 지표</b>: <span style="color:'+color+';font-size:20px;font-weight:bold;">'+pct+'%</span>' +
      ' &nbsp;·&nbsp; 신고가 <b style="color:#dc2626;">'+d.high_cnt+'</b>' +
      ' / 신저가 <b style="color:#2563eb;">'+d.low_cnt+'</b>' +
      ' &nbsp;·&nbsp; <span style="opacity:0.7;">'+d.ts_kst+' 기준 (장중 5분마다 갱신)</span>';
  } catch (e) {
    document.getElementById("live-banner").innerHTML =
      "📡 실시간 지표: 데이터 대기 중 (장중에만 갱신됩니다)";
  }
}
updateLive();
setInterval(updateLive, 60000);
</script>
