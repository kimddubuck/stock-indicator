<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>⭐ 오늘의 추천</title>
<style>
  body { margin:0; background:#f5efdf; color:#3d3529;
         font-family:-apple-system,'Malgun Gothic',sans-serif; }
  .wrap { max-width:680px; margin:0 auto; padding:14px 12px 40px; }
  .home { position:fixed; top:10px; left:10px; text-decoration:none; font-size:22px; }
  h1 { text-align:center; font-size:20px; margin:8px 0 2px; }
  .sub { text-align:center; color:#8a7c63; font-size:12px; margin-bottom:14px; }
  .summary { background:#fbf8f0; border:1px solid rgba(61,53,41,0.12);
             border-radius:12px; padding:12px 14px; margin-bottom:14px; }
  .summary h2 { font-size:13px; color:#7a6f5d; margin:0 0 8px; font-weight:700; }
  .stat-row { display:flex; gap:8px; flex-wrap:wrap; }
  .stat { flex:1; min-width:80px; text-align:center; padding:6px 4px;
          background:#f5efdf; border-radius:8px; }
  .stat .v { font-size:18px; font-weight:700; }
  .stat .l { font-size:10px; color:#a08a68; margin-top:2px; }
  .pos { color:#c0392b; } .neg { color:#2471c4; }
  .combo-tbl { width:100%; border-collapse:collapse; font-size:11px; margin-top:10px; }
  .combo-tbl th, .combo-tbl td { padding:4px 6px; text-align:right; }
  .combo-tbl th:first-child, .combo-tbl td:first-child { text-align:left; }
  .combo-tbl thead th { color:#a08a68; border-bottom:1px solid rgba(61,53,41,0.1); }
  .datenav { display:flex; align-items:center; justify-content:center;
             gap:12px; margin-bottom:14px; }
  .datenav button { background:#fbf8f0; border:1px solid rgba(61,53,41,0.15);
                    border-radius:8px; padding:6px 14px; font-size:16px;
                    cursor:pointer; color:#3d3529; }
  .datenav button:disabled { opacity:0.3; cursor:default; }
  .datenav .cur { font-weight:700; font-size:15px; min-width:120px; text-align:center; }
  .card { background:#fbf8f0; border:1px solid rgba(61,53,41,0.12);
          border-radius:12px; margin-bottom:10px; padding:12px 14px; }
  .card .top { display:flex; align-items:center; gap:8px; }
  .card .nm { font-weight:700; flex:1; }
  .card .cd { color:#a08a68; font-weight:400; font-size:11px; margin-left:4px; }
  .card .ret { font-size:18px; font-weight:700; }
  .card .detail { display:flex; gap:14px; margin-top:8px; font-size:12px; color:#7a6f5d; flex-wrap:wrap; }
  .card .detail span b { color:#3d3529; font-weight:600; }
  .combos { margin-top:8px; }
  .badge { display:inline-block; font-size:10px; padding:2px 6px; border-radius:6px;
           background:#eee3cc; color:#7a5c2e; margin-right:4px; }
  .empty { text-align:center; color:#8a7c63; padding:40px 0; line-height:1.7; }
  .note { color:#a08a68; font-size:11px; text-align:center; margin-top:16px; line-height:1.6; }
</style>
</head>
<body>
<a class="home" href="index.html">🏠</a>
<div class="wrap">
  <h1>⭐ 오늘의 추천</h1>
  <div class="sub" id="updated">성과 갱신: --</div>
  <div class="summary">
    <h2>📊 누적 성과 (추천 후 현재까지)</h2>
    <div class="stat-row">
      <div class="stat"><div class="v" id="s-count">-</div><div class="l">총 추천</div></div>
      <div class="stat"><div class="v" id="s-avg">-</div><div class="l">평균 수익률</div></div>
      <div class="stat"><div class="v" id="s-win">-</div><div class="l">승률</div></div>
    </div>
    <table class="combo-tbl">
      <thead><tr><th>조합</th><th>추천수</th><th>평균수익</th><th>승률</th></tr></thead>
      <tbody id="combo-body"></tbody>
    </table>
  </div>
  <div class="datenav">
    <button id="prev">‹</button>
    <span class="cur" id="curdate">-</span>
    <button id="next">›</button>
  </div>
  <div id="cards"></div>
  <div class="note">※ 추천은 종가 기준이며 투자 권유가 아닙니다.<br>
     수익률은 추천일 종가 대비 현재 종가 기준입니다.</div>
</div>
<script>
const PERF = {"전체": {"총추천수": 0, "전체평균수익률": null, "전체승률": null, "갱신시각": "2026-07-22 00:02"}, "조합별": {"A_20": {"추천수": 0, "평균수익률": null, "승률": null}, "A_60": {"추천수": 0, "평균수익률": null, "승률": null}, "B_20": {"추천수": 0, "평균수익률": null, "승률": null}, "B_60": {"추천수": 0, "평균수익률": null, "승률": null}}, "날짜별": {}};
const dates = Object.keys(PERF.날짜별 || {}).sort();
let idx = dates.length - 1;
function fmtPct(v){ if(v==null) return '-'; const s=(v>0?'+':'')+v.toFixed(1)+'%';
  return '<span class="'+(v>0?'pos':(v<0?'neg':''))+'">'+s+'</span>'; }
function renderSummary(){
  const o = PERF.전체 || {};
  document.getElementById('updated').textContent = '성과 갱신: ' + (o.갱신시각||'--');
  document.getElementById('s-count').textContent = (o.총추천수 ?? 0) + '건';
  document.getElementById('s-avg').innerHTML = fmtPct(o.전체평균수익률);
  document.getElementById('s-win').textContent = (o.전체승률!=null? o.전체승률+'%':'-');
  const cb = PERF.조합별 || {};
  document.getElementById('combo-body').innerHTML = ['A_20','A_60','B_20','B_60'].map(function(c){
    const s = cb[c]||{};
    return '<tr><td>'+c+'</td><td>'+(s.추천수??0)+'</td>'+
           '<td>'+(s.평균수익률!=null?fmtPct(s.평균수익률):'-')+'</td>'+
           '<td>'+(s.승률!=null?s.승률+'%':'-')+'</td></tr>';
  }).join('');
}
function renderDay(){
  if(dates.length===0){
    document.getElementById('curdate').textContent = '기록 없음';
    document.getElementById('cards').innerHTML =
      '<div class="empty">아직 추천 기록이 없어요.<br>공포 국면에 조건을 통과한 종목이 나오면 여기 쌓여요 🙂</div>';
    document.getElementById('prev').disabled = true;
    document.getElementById('next').disabled = true;
    return;
  }
  const d = dates[idx];
  document.getElementById('curdate').textContent = d;
  document.getElementById('prev').disabled = (idx<=0);
  document.getElementById('next').disabled = (idx>=dates.length-1);
  const rows = PERF.날짜별[d] || [];
  if(rows.length===0){
    document.getElementById('cards').innerHTML =
      '<div class="empty">이 날은 추천 종목이 없었어요.</div>';
    return;
  }
  document.getElementById('cards').innerHTML = rows.map(function(r){
    const badges = (r.통과조합||[]).map(function(c){return '<span class="badge">'+c+'</span>';}).join('');
    return '<div class="card"><div class="top">'+
      '<span class="nm">'+r.종목명+'<span class="cd">'+r.종목코드+'</span></span>'+
      '<span class="ret">'+fmtPct(r['수익률(%)'])+'</span></div>'+
      '<div class="detail">'+
        '<span>매수 <b>'+Number(r.매수가).toLocaleString()+'</b></span>'+
        '<span>현재 <b>'+Number(r.현재가).toLocaleString()+'</b></span>'+
        '<span>외인 <b>'+r.외인연속+'일</b></span>'+
        '<span>기관 <b>'+r.기관연속+'일</b></span>'+
      '</div><div class="combos">'+badges+'</div></div>';
  }).join('');
}
document.getElementById('prev').onclick = function(){ if(idx>0){idx--; renderDay();} };
document.getElementById('next').onclick = function(){ if(idx<dates.length-1){idx++; renderDay();} };
renderSummary(); renderDay();
</script>
</body>
</html>
